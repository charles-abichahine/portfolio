<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!--
      Square icons. logo.svg is 110x100, and Google rejects a non-square favicon
      for search results (it wants a square, ideally a multiple of 48px), so the
      mark is recomposed square here. favicon.ico is listed first because Google
      and older browsers probe /favicon.ico regardless of what is declared.
    -->
    <link rel="icon" href="/favicon.ico?v=2" sizes="any" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2" />
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96.png?v=2" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png?v=2" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Charles Abi Chahine | architect & computational designer. MaCAD, IAAC. Computational design, BIM workflows, and AI in architecture."
    />
    <title>Charles Abi Chahine | Architect &amp; Computational Designer</title>
    <link rel="canonical" href="https://charlesabichahine.com/" />

    <!-- Google Search Console ownership verification. Must stay in <head>. -->
    <meta name="google-site-verification" content="uDwArUniJUsZsppoYJIS4WyesimrzpZZ5glsESX15Jw" />

    <!--
      Social preview. The site is a client-rendered SPA, so every route serves
      this same head: the card is deliberately about the person, not the page,
      which reads correctly wherever a link is shared. og:image must be an
      absolute URL — Slack/LinkedIn/WhatsApp will not resolve a relative one.
    -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Charles Abi Chahine" />
    <meta property="og:url" content="https://charlesabichahine.com/" />
    <meta property="og:title" content="Charles Abi Chahine | Architect &amp; Computational Designer" />
    <meta
      property="og:description"
      content="Architect and computational designer (MaCAD, IAAC). Projects across computational design, BIM workflows, and AI in architecture."
    />
    <meta property="og:image" content="https://charlesabichahine.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Charles Abi Chahine — architect and computational designer" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Charles Abi Chahine | Architect &amp; Computational Designer" />
    <meta
      name="twitter:description"
      content="Architect and computational designer (MaCAD, IAAC). Projects across computational design, BIM workflows, and AI in architecture."
    />
    <meta name="twitter:image" content="https://charlesabichahine.com/og-image.png" />
    <!--
      Resolve the theme before first paint, or the page renders light and then
      snaps to dark once React mounts. Must stay inline and stay in <head>:
      an external file would be another round trip with the flash inside it.
      Absent a stored choice we follow the OS and store nothing, so the site
      keeps tracking prefers-color-scheme until the toggle is actually used.
    -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('theme')
          var theme =
            stored === 'light' || stored === 'dark'
              ? stored
              : window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light'
          document.documentElement.setAttribute('data-theme', theme)
        } catch (e) {
          // localStorage throws in some privacy modes — fall back to light.
          document.documentElement.setAttribute('data-theme', 'light')
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
