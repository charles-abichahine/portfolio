<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>/work index — design mock</title>
<style>
  :root{
    --paper:#ffffff; --ink:#111110; --soft:#55554f; --muted:#8a8a82;
    --line:#e6e6e2; --accent:#d92b1f;
    --sans:"Helvetica Neue",Helvetica,Arial,ui-sans-serif,system-ui,sans-serif;
    --mono:Consolas,"Cascadia Code","SF Mono",ui-monospace,monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;background:var(--paper);color:var(--ink);
    font-family:var(--sans);-webkit-font-smoothing:antialiased;}
  ::selection{background:var(--accent);color:#fff;}
  a{color:inherit;text-decoration:none;}

  .label-mono{font-family:var(--mono);font-size:0.68rem;letter-spacing:0.14em;text-transform:uppercase;}

  .wrap{max-width:72rem;margin:0 auto;padding:4rem 1.5rem 6rem;}

  /* ---- masthead ---- */
  .kicker{margin:0 0 0.85rem;color:var(--muted);}
  .h1{margin:0 0 1.25rem;font-weight:700;letter-spacing:-0.02em;line-height:1;
    font-size:clamp(2.25rem,5vw,2.75rem);}
  .h1 .dot{color:var(--accent);}

  /* ---- two-column shell ---- */
  .layout{display:grid;grid-template-columns:7fr 5fr;gap:2.5rem;align-items:start;}
  .index{min-width:0;}

  /* ---- category groups ---- */
  .group{margin-top:3.5rem;}
  .group:first-child{margin-top:0.5rem;}
  .grouphead{display:flex;justify-content:space-between;align-items:baseline;
    border-top:1px solid var(--ink);padding-top:0.85rem;}
  .grouphead .glabel{color:var(--muted);}
  .grouphead .gcount{color:var(--muted);}

  /* ---- rows ---- */
  .row{position:relative;display:flex;align-items:baseline;gap:1rem;
    padding:1.35rem 0;border-top:1px solid var(--line);cursor:pointer;}
  .group .row:first-of-type{border-top:none;}
  .row::before{content:"";position:absolute;left:-1rem;top:1.35rem;bottom:1.35rem;
    width:2px;background:var(--accent);opacity:0;transition:opacity 150ms ease;}
  .row.active::before{opacity:1;}

  .num{flex:none;width:2.6ch;font-family:var(--mono);font-size:0.68rem;
    letter-spacing:0.14em;color:var(--muted);padding-top:0.35rem;}

  .chip{display:none;} /* desktop hidden; mobile shows it */

  .rowbody{flex:1;min-width:0;display:flex;justify-content:space-between;
    align-items:baseline;gap:1.25rem;}
  .titleline{display:flex;align-items:baseline;flex-wrap:wrap;gap:0.55rem;min-width:0;}
  .title{font-weight:600;letter-spacing:-0.02em;line-height:1.05;color:var(--ink);
    font-size:clamp(1.5rem,2.2vw,2rem);transition:color 150ms ease;}
  .index.dimming .row:not(.active) .title{color:var(--soft);}

  .award{display:inline-flex;align-items:center;gap:0.375rem;white-space:nowrap;
    border:1px solid color-mix(in srgb,var(--accent) 40%,transparent);
    border-radius:9999px;padding:0.1rem 0.6rem;color:var(--accent);
    font-family:var(--mono);font-size:0.66rem;letter-spacing:0.1em;text-transform:uppercase;}
  .award .star{font-size:0.72em;}

  .meta{flex:none;display:flex;align-items:baseline;gap:1.1rem;white-space:nowrap;
    font-family:var(--mono);font-size:0.68rem;letter-spacing:0.14em;text-transform:uppercase;}
  .meta .tools{color:var(--muted);}
  .meta .cta{color:var(--soft);transition:color 150ms ease;}
  .meta .cta .arrow{color:var(--muted);transition:transform 150ms ease,color 150ms ease;
    display:inline-block;margin-left:0.15rem;}
  .row.active .meta .cta{color:var(--accent);}
  .row.active .meta .cta .arrow{color:var(--accent);transform:translate(2px,-2px);}

  /* ---- plate ---- */
  .plate-col{position:sticky;top:2.5rem;}
  .plate{margin:0;}
  .plate-frame{position:relative;aspect-ratio:4/3;border:1px solid var(--line);
    overflow:hidden;background:var(--paper);}
  .plate-frame .cover{position:absolute;inset:0;width:100%;height:100%;
    object-fit:cover;display:block;}
  .cover-front{z-index:2;clip-path:inset(0 0 0 0);}
  .cover-back{z-index:1;}
  /* corner registration ticks */
  .tick{position:absolute;width:9px;height:9px;z-index:3;pointer-events:none;}
  .tick.tl{top:5px;left:5px;border-top:1px solid var(--muted);border-left:1px solid var(--muted);}
  .tick.tr{top:5px;right:5px;border-top:1px solid var(--muted);border-right:1px solid var(--muted);}
  .tick.bl{bottom:5px;left:5px;border-bottom:1px solid var(--muted);border-left:1px solid var(--muted);}
  .tick.br{bottom:5px;right:5px;border-bottom:1px solid var(--muted);border-right:1px solid var(--muted);}
  .caption{margin-top:0.85rem;font-family:var(--mono);font-size:0.72rem;
    letter-spacing:0.04em;color:var(--muted);}
  .caption .c-title{color:var(--ink);}
  .caption .c-award{color:var(--accent);}
  .caption .c-award .star{font-size:0.8em;}

  /* keyboard focus */
  .row:focus-visible{outline:2px solid var(--accent);outline-offset:4px;}

  /* ---- mobile toggle (only shown on narrow screens) ---- */
  .toggle{display:none;}

  /* ================= MOBILE (< 1024px) ================= */
  @media (max-width:1023px){
    .wrap{padding:3rem 1.25rem 5rem;}
    .layout{display:block;}
    .plate-col{display:none;}

    .row{align-items:flex-start;gap:0.9rem;padding:1.1rem 0;}
    .num{display:none;}
    .row::before{left:-0.6rem;top:1.1rem;bottom:1.1rem;}

    /* thumbnail (default) */
    body[data-mobile="thumb"] .chip{display:block;flex:none;width:66px;aspect-ratio:4/3;
      object-fit:cover;border:1px solid var(--line);}
    body[data-mobile="text"] .chip{display:none;}

    .rowbody{flex-direction:column;justify-content:flex-start;align-items:flex-start;gap:0.55rem;}
    .title{font-size:1.375rem;}
    .meta{flex-wrap:wrap;white-space:normal;gap:0.9rem;}

    .toggle{display:flex;gap:0;position:fixed;top:0.7rem;right:0.7rem;z-index:50;
      border:1px solid var(--line);background:rgba(255,255,255,0.9);backdrop-filter:blur(6px);
      font-family:var(--mono);font-size:0.6rem;letter-spacing:0.12em;text-transform:uppercase;}
    .toggle button{appearance:none;border:0;background:none;cursor:pointer;
      padding:0.45rem 0.7rem;color:var(--muted);font:inherit;}
    body[data-mobile="thumb"] .toggle button[data-v="thumb"],
    body[data-mobile="text"]  .toggle button[data-v="text"]{color:var(--ink);background:var(--line);}
  }

  @media (prefers-reduced-motion:reduce){
    .title,.meta .cta,.meta .cta .arrow,.row::before{transition:none !important;}
  }
</style>
</head>
<body data-mobile="thumb">
  <div class="toggle" role="group" aria-label="Mobile treatment">
    <button data-v="thumb" type="button">Thumbnail</button>
    <button data-v="text" type="button">Text-only</button>
  </div>

  <main class="wrap">
    <p class="kicker label-mono">Index — 06 Projects</p>
    <h1 class="h1">Work<span class="dot">.</span></h1>

    <div class="layout">
      <div class="index" id="index"></div>
      <div class="plate-col">
        <figure class="plate">
          <div class="plate-frame">
            <img class="cover cover-back" id="coverBack" alt="" />
            <img class="cover cover-front" id="coverFront" alt="" />
            <span class="tick tl"></span><span class="tick tr"></span>
            <span class="tick bl"></span><span class="tick br"></span>
          </div>
          <figcaption class="caption" id="caption"></figcaption>
        </figure>
      </div>
    </div>
  </main>

<script>
  const DATA = [
    { group:"Computation & AI", items:[
      { num:"01", slug:"sensi",        title:"Sensi",              year:"2026",    tools:"PYTHON · SENSORY AI",   cover:"projects/sensi/cover.gif",              poster:"projects/sensi/poster.webp",              award:"MaCAD Award 2026" },
      { num:"02", slug:"urban-risk",   title:"Encoding Urban Risk",year:"2026",    tools:"PYTHON · ML · GIS",     cover:"projects/urban-risk/cover.webp",        poster:"projects/urban-risk/cover.webp",          award:null },
      { num:"03", slug:"legoarch",     title:"lEgoarCh",           year:"2026",    tools:"FLUX · TRELLIS · PYTHON",cover:"projects/legoarch/cover.gif",           poster:"projects/legoarch/poster.webp",           award:null },
    ]},
    { group:"BIM & Workflows", items:[
      { num:"04", slug:"breathing-mass",title:"Breathing Mass",    year:"2026",    tools:"GH · ALPACA · SPECKLE", cover:"projects/breathing-mass/cover.gif",     poster:"projects/breathing-mass/cover.webp",      award:null },
    ]},
    { group:"Design & Research", items:[
      { num:"05", slug:"huddle",        title:"The Huddle",        year:"2025/26", tools:"GH · WASP · KANGAROO",  cover:"projects/huddle/persp-01.webp",         poster:"projects/huddle/persp-01.webp",           award:null },
      { num:"06", slug:"luminous-stratum",title:"The Luminous Stratum",year:"2025",tools:"GH · KANGAROO",        cover:"projects/luminous-stratum/cover.webp",  poster:"projects/luminous-stratum/cover.webp",    award:null },
    ]},
  ];

  // ?static=1 renders posters instead of animated GIFs (used for reliable screenshots)
  const STATIC = new URLSearchParams(location.search).has("static");
  const coverOf = it => STATIC ? it.poster : it.cover;

  const flat = DATA.flatMap(g => g.items);
  const armed = flat[0]; // Sensi armed at rest

  const esc = s => s.replace(/&/g,"&amp;").replace(/</g,"&lt;");
  const awardPill = a => a
    ? `<span class="award"><span class="star" aria-hidden="true">★</span>${esc(a)}</span>` : "";

  const index = document.getElementById("index");
  index.innerHTML = DATA.map(g => `
    <section class="group">
      <div class="grouphead">
        <span class="glabel label-mono">${esc(g.group)}</span>
        <span class="gcount label-mono">— ${String(g.items.length).padStart(2,"0")}</span>
      </div>
      ${g.items.map(it => `
        <a class="row" href="#/work/${it.slug}" data-slug="${it.slug}">
          <span class="num">${it.num}</span>
          <img class="chip" src="${it.poster}" loading="lazy" alt="" />
          <span class="rowbody">
            <span class="titleline">
              <span class="title">${esc(it.title)}</span>
              ${awardPill(it.award)}
            </span>
            <span class="meta">
              <span class="tools">${esc(it.tools)}</span>
              <span class="cta">Open project <span class="arrow" aria-hidden="true">↗</span></span>
            </span>
          </span>
        </a>`).join("")}
    </section>`).join("");

  // ---- desktop plate reveal ----
  const front = document.getElementById("coverFront");
  const back  = document.getElementById("coverBack");
  const caption = document.getElementById("caption");
  const reduce = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

  // preload covers so the wipe is smooth (mock only; production lazy-loads the heavy gifs)
  flat.forEach(it => { const i = new Image(); i.src = coverOf(it); });

  let current = null;
  function setCaption(it){
    caption.innerHTML = `<span class="c-title">${esc(it.title)}</span> · ${esc(it.year)}` +
      (it.award ? ` &nbsp;<span class="c-award"><span class="star" aria-hidden="true">★</span> ${esc(it.award)}</span>` : "");
  }
  function reveal(it, animate){
    if (it === current) return;
    front.alt = it.title;
    if (!animate || reduce){
      front.style.transition = "none";
      back.src = coverOf(it); front.src = coverOf(it);
      front.style.clipPath = "inset(0 0 0 0)";
    } else {
      back.src = front.src || coverOf(it);      // hold outgoing beneath
      front.style.transition = "none";
      front.style.clipPath = "inset(0 0 100% 0)";
      front.src = coverOf(it);
      void front.offsetWidth;                // reflow
      front.style.transition = "clip-path 260ms cubic-bezier(0.22,1,0.36,1)";
      front.style.clipPath = "inset(0 0 0 0)";
    }
    current = it;
    setCaption(it);
  }
  reveal(armed, false); // armed rest state

  const rows = [...document.querySelectorAll(".row")];
  const bySlug = Object.fromEntries(flat.map(it => [it.slug, it]));
  function activate(row){
    const it = bySlug[row.dataset.slug];
    index.classList.add("dimming");
    rows.forEach(r => r.classList.toggle("active", r === row));
    reveal(it, true);
  }
  function rest(){
    index.classList.remove("dimming");
    rows.forEach(r => r.classList.remove("active"));
    reveal(armed, true);
  }
  rows.forEach(row => {
    row.addEventListener("mouseenter", () => activate(row));
    row.addEventListener("focus", () => activate(row));
    row.addEventListener("click", e => e.preventDefault()); // mock: don't navigate
  });
  index.addEventListener("mouseleave", rest);
  index.addEventListener("focusout", e => {
    if (!index.contains(e.relatedTarget)) rest();
  });

  // ---- mobile treatment toggle ----
  document.querySelector(".toggle").addEventListener("click", e => {
    const v = e.target.closest("button")?.dataset.v;
    if (v) document.body.dataset.mobile = v;
  });
</script>
</body>
</html>
